<!DOCTYPE html>
<!-- VERSION: 2.1 - Fix riepilogo prodotti completo -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ordini Frutta e Verdura</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2ecc71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .customer-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .customer-info h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        /* Search Section Styles */
        .search-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .clear-search {
            position: absolute;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s;
        }

        .clear-search:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .search-results {
            margin-top: 15px;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 4px solid #2ecc71;
        }

        .search-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .search-result-name {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1em;
        }

        .search-result-category {
            font-size: 0.85em;
            color: #666;
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #999;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2ecc71;
        }

        /* Data Picker Styling */
        .date-input-wrapper {
            position: relative;
        }

        .date-input-wrapper input[type="date"] {
            padding-right: 40px;
        }

        .date-input-wrapper::after {
            content: "📅";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3em;
            pointer-events: none;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .category-card.active {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        .category-header {
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            color: white;
        }

        .products {
            display: none;
            padding: 20px;
            background: #f8f9fa;
        }

        .products.active {
            display: block;
        }

        .product-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .product-name {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .product-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .product-inputs input[type="number"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 80px;
        }

        /* Toggle Switch per Unità di Misura */
        .unit-toggle {
            display: flex;
            background: #e9ecef;
            border-radius: 8px;
            padding: 4px;
            flex: 2;
        }

        .unit-option {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9em;
            color: #666;
            user-select: none;
        }

        .unit-option:hover {
            background: #dee2e6;
        }

        .unit-option.active {
            background: #2ecc71;
            color: white;
            box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
        }

        .notes-section {
            margin: 30px 0;
        }

        .notes-section textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            min-height: 100px;
            resize: vertical;
        }

        .notes-section textarea:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .summary {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin: 30px 0;
            display: none;
        }

        .summary.active {
            display: block;
        }

        .summary h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .summary-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #2ecc71;
        }

        .summary-category {
            font-weight: bold;
            color: #2ecc71;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .summary-product {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-product:last-child {
            border-bottom: none;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .btn-send {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            font-size: 1.2em;
            padding: 18px 50px;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3);
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            text-align: center;
        }

        .success-message.active {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .categories {
                grid-template-columns: 1fr;
            }

            .product-inputs {
                flex-direction: column;
                gap: 8px;
            }

            .product-inputs input[type="number"] {
                width: 100%;
            }

            .unit-toggle {
                width: 100%;
            }

            .unit-option {
                font-size: 0.85em;
                padding: 10px 5px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Loading overlay per invio ordine */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .loading-content .spinner {
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <h3>📤 Invio ordine in corso...</h3>
            <div class="spinner"></div>
            <p>Attendere prego...</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🍎 Ordini Frutta e Verdura</h1>
            <p>Seleziona i prodotti e invia il tuo ordine</p>
        </div>

        <div class="content">
            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p>Caricamento prodotti...</p>
            </div>

            <div id="mainContent" style="display: none;">
                <!-- Informazioni Cliente -->
                <div class="customer-info">
                    <h3>Informazioni Cliente</h3>
                    <div class="form-group">
                        <label for="customerName">Nome/Ragione Sociale *</label>
                        <input type="text" id="customerName" placeholder="Inserisci il nome" required>
                    </div>
                    <div class="form-group">
                        <label for="customerPhone">Telefono *</label>
                        <input type="tel" id="customerPhone" placeholder="Es: 3331234567" required>
                    </div>
                    <div class="form-group">
                        <label for="deliveryDate">Data di Consegna *</label>
                        <div class="date-input-wrapper">
                            <input type="date" id="deliveryDate" required>
                        </div>
                    </div>
                </div>

                <!-- Barra di Ricerca Globale -->
                <div class="search-section">
                    <h3 style="margin-bottom: 15px; color: #2c3e50;">🔍 Cerca Prodotto</h3>
                    <div class="search-wrapper">
                        <input type="text" 
                               id="searchInput" 
                               placeholder="Cerca un prodotto..." 
                               oninput="searchProducts(event.target.value)">
                        <button class="clear-search" onclick="clearSearch()" id="clearSearchBtn" style="display: none;">✕</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>

                <!-- Categorie -->
                <h2 style="margin-bottom: 20px; color: #2c3e50;">Categorie Prodotti</h2>
                <div class="categories" id="categoriesContainer"></div>

                <!-- Note Aggiuntive -->
                <div class="notes-section">
                    <h3 style="margin-bottom: 15px; color: #2c3e50;">Note Aggiuntive (opzionale)</h3>
                    <textarea id="orderNotes" placeholder="Inserisci eventuali note per l'ordine..."></textarea>
                </div>

                <!-- Pulsante Genera Riepilogo -->
                <div class="buttons">
                    <button class="btn btn-primary" onclick="generateSummary()">📋 Genera Riepilogo</button>
                </div>

                <!-- Riepilogo Ordine -->
                <div class="summary" id="orderSummary">
                    <h3>📋 Riepilogo Ordine</h3>
                    <div id="summaryContent"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-send" onclick="sendOrder()">📤 INVIA ORDINE</button>
                        <button class="btn btn-secondary" onclick="editOrder()">✏️ Modifica Ordine</button>
                        <button class="btn btn-secondary" onclick="resetOrder()">🔄 Nuovo Ordine</button>
                    </div>
                </div>

                <div class="success-message" id="successMessage">
                    ✅ Ordine inviato con successo!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Wrap tutto in un namespace per evitare conflitti
        (function() {
            // ============================================
            // CONFIGURAZIONE SUPABASE
            // ============================================
            const SUPABASE_URL = 'https://nleuqsggnnlgajpivznk.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZXVxc2dnbm5sZ2FqcGl2em5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDMxMDQsImV4cCI6MjA4NzU3OTEwNH0.qSM7gaxcsI1AnRFGx2qulxqa6tSmBEIVEVjK2tTNCq8';
            
            // Configurazione invio ordini
            const WHATSAPP_NUMBER = '393804505537';
            const EMAIL_ADDRESS = 'pistolesiortofrutta@gmail.com';

            // Inizializza Supabase
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let categoriesData = [];
            let productsData = [];
            let activeCategory = null;

            // Imposta data minima a domani
            window.addEventListener('DOMContentLoaded', () => {
                const dateInput = document.getElementById('deliveryDate');
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateInput.min = tomorrow.toISOString().split('T')[0];
                dateInput.value = tomorrow.toISOString().split('T')[0];
            });

            // ============================================
            // CARICAMENTO DATI DA SUPABASE
            // ============================================
            async function loadData() {
                console.log('🔵 Inizio caricamento dati...');
                
                try {
                    console.log('📂 Caricamento categorie...');
                    const { data: categories, error: catError } = await supabase
                        .from('categorie')
                        .select('*')
                        .eq('attiva', true)
                        .order('ordine', { ascending: true });

                    if (catError) {
                        console.error('❌ Errore categorie:', catError);
                        throw catError;
                    }
                    console.log('✅ Categorie caricate:', categories.length);
                    categoriesData = categories;

                    console.log('📦 Caricamento prodotti...');
                    const { data: products, error: prodError } = await supabase
                        .from('prodotti')
                        .select('*')
                        .eq('attivo', true)
                        .order('ordine', { ascending: true });

                    if (prodError) {
                        console.error('❌ Errore prodotti:', prodError);
                        throw prodError;
                    }
                    console.log('✅ Prodotti caricati:', products.length);
                    productsData = products;

                    console.log('🎨 Rendering interfaccia...');
                    renderCategories();
                    
                    console.log('✅ Tutto caricato con successo!');
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';

                } catch (error) {
                    console.error('❌ ERRORE GENERALE:', error);
                    document.getElementById('loadingIndicator').innerHTML = `
                        <div class="error-message">
                            <strong>Errore di connessione</strong><br>
                            Impossibile caricare i prodotti.<br><br>
                            <strong>Errore:</strong> ${error.message}<br>
                        </div>
                    `;
                }
            }

            // ============================================
            // RENDERING INTERFACCIA
            // ============================================
            function renderCategories() {
                const container = document.getElementById('categoriesContainer');
                container.innerHTML = '';

                categoriesData.forEach(category => {
                    const categoryProducts = productsData
                        .filter(p => p.categoria_id === category.id)
                        .sort((a, b) => a.nome.localeCompare(b.nome, 'it'));
                    
                    const categoryCard = document.createElement('div');
                    categoryCard.className = 'category-card';
                    categoryCard.onclick = (e) => {
                        // Non chiudere se si clicca su input o toggle
                        if (e.target.tagName === 'INPUT' || 
                            e.target.classList.contains('unit-option') ||
                            e.target.closest('.unit-toggle') ||
                            e.target.closest('.product-inputs')) {
                            return;
                        }
                        toggleCategory(category.id);
                    };

                    let productsHTML = '';
                    categoryProducts.forEach(product => {
                        productsHTML += `
                            <div class="product-item" onclick="event.stopPropagation()">
                                <div class="product-name">${product.nome}</div>
                                <div class="product-inputs">
                                    <input type="number" 
                                           min="0" 
                                           step="0.5" 
                                           placeholder="Quantità" 
                                           data-product-id="${product.id}"
                                           data-product-name="${product.nome}"
                                           data-category-name="${category.nome}"
                                           onclick="event.stopPropagation()">
                                    <div class="unit-toggle" data-product-id="${product.id}" onclick="event.stopPropagation()">
                                        <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Cassa')">Cassa</div>
                                        <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Kg')">Kg</div>
                                        <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Pezzi')">Pezzi</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    categoryCard.innerHTML = `
                        <div class="category-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); cursor: pointer;">
                            <div style="font-size: 3em; margin-bottom: 10px;">${category.icona}</div>
                            <div style="font-size: 1em; font-weight: 600; color: white;">${category.nome}</div>
                        </div>
                        <div class="products" id="products-${category.id}">
                            ${productsHTML}
                        </div>
                    `;

                    container.appendChild(categoryCard);
                });
            }

            window.toggleCategory = function(categoryId) {
                // Chiudi tutte le altre categorie
                document.querySelectorAll('.category-card').forEach(card => {
                    if (!card.querySelector(`#products-${categoryId}`)) {
                        card.classList.remove('active');
                        card.querySelector('.products').classList.remove('active');
                    }
                });

                // Toggle la categoria cliccata
                const productsDiv = document.getElementById('products-' + categoryId);
                const card = productsDiv.parentElement;
                
                card.classList.toggle('active');
                productsDiv.classList.toggle('active');
                
                activeCategory = card.classList.contains('active') ? categoryId : null;
            }

            window.selectUnit = function(event, productId, unit) {
                event.stopPropagation();
                const toggle = document.querySelector(`.unit-toggle[data-product-id="${productId}"]`);
                if (toggle) {
                    toggle.querySelectorAll('.unit-option').forEach(opt => opt.classList.remove('active'));
                    event.target.classList.add('active');
                }
            }

            function getSelectedUnit(productId) {
                const toggle = document.querySelector(`.unit-toggle[data-product-id="${productId}"]`);
                const activeOption = toggle ? toggle.querySelector('.unit-option.active') : null;
                return activeOption ? activeOption.textContent : null;
            }

            // ============================================
            // RICERCA PRODOTTI
            // ============================================
            window.searchProducts = function(query) {
                const searchResults = document.getElementById('searchResults');
                const clearBtn = document.getElementById('clearSearchBtn');
                const categoriesContainer = document.getElementById('categoriesContainer');
                
                if (!query || query.trim().length < 2) {
                    searchResults.classList.remove('active');
                    searchResults.innerHTML = '';
                    clearBtn.style.display = 'none';
                    categoriesContainer.style.display = 'grid';
                    return;
                }

                clearBtn.style.display = 'block';
                categoriesContainer.style.display = 'none';

                const searchTerm = query.toLowerCase().trim();
                const results = productsData.filter(product => 
                    product.nome.toLowerCase().includes(searchTerm)
                );

                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="no-results">😔 Nessun prodotto trovato</div>';
                    searchResults.classList.add('active');
                    return;
                }

                let resultsHTML = '';
                results.forEach(product => {
                    const category = categoriesData.find(c => c.id === product.categoria_id);
                    resultsHTML += `
                        <div class="search-result-item">
                            <div class="search-result-header">
                                <div class="search-result-name">${product.nome}</div>
                                <div class="search-result-category">${category.icona} ${category.nome}</div>
                            </div>
                            <div class="product-inputs" onclick="event.stopPropagation()">
                                <input type="number" 
                                       min="0" 
                                       step="0.5" 
                                       placeholder="Quantità" 
                                       data-product-id="${product.id}"
                                       data-product-name="${product.nome}"
                                       data-category-name="${category.nome}"
                                       onclick="event.stopPropagation()">
                                <div class="unit-toggle" data-product-id="${product.id}" onclick="event.stopPropagation()">
                                    <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Cassa')">Cassa</div>
                                    <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Kg')">Kg</div>
                                    <div class="unit-option" onclick="selectUnit(event, '${product.id}', 'Pezzi')">Pezzi</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                searchResults.innerHTML = resultsHTML;
                searchResults.classList.add('active');
            }

            window.clearSearch = function() {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').classList.remove('active');
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('clearSearchBtn').style.display = 'none';
                document.getElementById('categoriesContainer').style.display = 'grid';
            }

            // ============================================
            // GESTIONE ORDINE
            // ============================================
            window.generateSummary = async function() {
                console.log('🔥🔥🔥 GENERATE SUMMARY - VERSION 2.1 - FIX COMPLETO 🔥🔥🔥');
                
                const customerName = document.getElementById('customerName').value.trim();
                const customerPhone = document.getElementById('customerPhone').value.trim();
                const deliveryDate = document.getElementById('deliveryDate').value;
                
                if (!customerName || !customerPhone || !deliveryDate) {
                    alert('Per favore, compila tutti i campi obbligatori (Nome, Telefono, Data di Consegna).');
                    return;
                }

                const allInputs = document.querySelectorAll('input[type="number"][data-product-id]');
                let orderItems = [];
                let missingUnits = [];
                
                console.log(`📊 Totale input trovati: ${allInputs.length}`);
                
                allInputs.forEach(input => {
                    const quantity = parseFloat(input.value);
                    const productName = input.getAttribute('data-product-name');
                    
                    console.log(`🔍 Input: ${productName}, Value: "${input.value}", Parsed: ${quantity}`);
                    
                    if (quantity > 0) {
                        const productId = input.getAttribute('data-product-id');
                        const categoryName = input.getAttribute('data-category-name');
                        const unit = getSelectedUnit(productId);
                        
                        console.log(`Prodotto: ${productName}, Quantità: ${quantity}, Unità: ${unit}`);
                        
                        if (!unit) {
                            missingUnits.push(productName);
                        } else {
                            orderItems.push({
                                categoryName: categoryName,
                                productName: productName,
                                quantity: quantity,
                                unit: unit
                            });
                        }
                    }
                });

                console.log('Order Items raccolti:', orderItems);
                console.log('Prodotti senza unità:', missingUnits);

                if (missingUnits.length > 0) {
                    alert(`⚠️ Per favore, seleziona l'unità di misura per:\n\n${missingUnits.join('\n')}`);
                    return;
                }

                if (orderItems.length === 0) {
                    alert('Seleziona almeno un prodotto per generare il riepilogo.');
                    return;
                }

                // Raggruppa per categoria
                const groupedItems = {};
                orderItems.forEach(item => {
                    if (!groupedItems[item.categoryName]) {
                        groupedItems[item.categoryName] = [];
                    }
                    groupedItems[item.categoryName].push(item);
                });

                // Formatta data
                const dateObj = new Date(deliveryDate);
                const formattedDate = dateObj.toLocaleDateString('it-IT', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                // Genera HTML riepilogo
                let summaryHTML = `
                    <div class="summary-item">
                        <strong>Cliente:</strong> ${customerName}<br>
                        <strong>Telefono:</strong> ${customerPhone}<br>
                        <strong>Data di Consegna:</strong> ${formattedDate}
                    </div>
                `;

                for (const [categoryName, items] of Object.entries(groupedItems)) {
                    const category = categoriesData.find(c => c.nome === categoryName);
                    summaryHTML += `<div class="summary-category">${category.icona} ${categoryName.toUpperCase()}</div>`;
                    summaryHTML += `<div class="summary-item">`;
                    items.forEach(item => {
                        summaryHTML += `<div class="summary-product">• ${item.productName}: ${item.quantity} ${item.unit}</div>`;
                    });
                    summaryHTML += `</div>`;
                }

                const notes = document.getElementById('orderNotes').value.trim();
                if (notes) {
                    summaryHTML += `
                        <div class="summary-item">
                            <strong>Note:</strong><br>
                            ${notes.replace(/\n/g, '<br>')}
                        </div>
                    `;
                }

                document.getElementById('summaryContent').innerHTML = summaryHTML;
                document.getElementById('orderSummary').classList.add('active');

                // Salva ordine in Supabase
                await saveOrderToDatabase(customerName, customerPhone, deliveryDate, orderItems, notes);

                // Scroll al riepilogo
                document.getElementById('orderSummary').scrollIntoView({ behavior: 'smooth' });
            }

            async function saveOrderToDatabase(customerName, customerPhone, deliveryDate, orderItems, notes) {
                try {
                    const noteWithDate = `Data consegna: ${deliveryDate}${notes ? '\n' + notes : ''}`;
                    
                    const { data: order, error: orderError } = await supabase
                        .from('ordini')
                        .insert({
                            cliente_nome: customerName,
                            cliente_telefono: customerPhone,
                            note: noteWithDate,
                            totale_prodotti: orderItems.length,
                            stato: 'nuovo'
                        })
                        .select()
                        .single();

                    if (orderError) throw orderError;

                    const dettagli = orderItems.map(item => ({
                        ordine_id: order.id,
                        prodotto_nome: item.productName,
                        categoria_nome: item.categoryName,
                        quantita: item.quantity,
                        unita: item.unit
                    }));

                    const { error: dettagliError } = await supabase
                        .from('ordini_dettagli')
                        .insert(dettagli);

                    if (dettagliError) throw dettagliError;

                    console.log('Ordine salvato con successo:', order.id);
                } catch (error) {
                    console.error('Errore salvataggio ordine:', error);
                }
            }

            window.sendOrder = async function() {
                document.getElementById('loadingOverlay').classList.add('active');
                
                try {
                    const customerName = document.getElementById('customerName').value.trim();
                    const customerPhone = document.getElementById('customerPhone').value.trim();
                    const deliveryDate = document.getElementById('deliveryDate').value;
                    const notes = document.getElementById('orderNotes').value.trim();
                    
                    // Raccogli prodotti ordinati
                    const allInputs = document.querySelectorAll('input[type="number"][data-product-id]');
                    const prodotti = [];
                    
                    allInputs.forEach(input => {
                        const quantity = parseFloat(input.value);
                        if (quantity > 0) {
                            const productId = input.getAttribute('data-product-id');
                            const productName = input.getAttribute('data-product-name');
                            const categoryName = input.getAttribute('data-category-name');
                            const unit = getSelectedUnit(productId);
                            
                            if (!unit) {
                                throw new Error(`Seleziona l'unità di misura per ${productName}`);
                            }
                            
                            prodotti.push({
                                nome: productName,
                                categoria: categoryName,
                                quantita: quantity,
                                unita: unit
                            });
                        }
                    });

                    if (prodotti.length === 0) {
                        throw new Error('Seleziona almeno un prodotto');
                    }

                    // Prepara dati ordine per Edge Function
                    const orderData = {
                        cliente_nome: customerName,
                        cliente_telefono: customerPhone,
                        cliente_email: '',
                        data_consegna: deliveryDate,
                        note: notes,
                        prodotti: prodotti
                    };

                    console.log('📤 Invio ordine tramite Edge Function...');
                    console.log('Dati ordine:', orderData);

                    // Chiama Edge Function per invio automatico email
                    const response = await fetch(
                        `${SUPABASE_URL}/functions/v1/send-order`,
                        {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                            },
                            body: JSON.stringify({ ordine: orderData })
                        }
                    );

                    const result = await response.json();
                    console.log('Risposta Edge Function:', result);

                    if (!response.ok || !result.success) {
                        throw new Error(result.error || 'Errore durante l\'invio');
                    }

                    console.log('✅ Ordine inviato con successo!');

                    // Successo!
                    document.getElementById('loadingOverlay').classList.remove('active');
                    document.getElementById('successMessage').innerHTML = `
                        ✅ Ordine inviato con successo!<br>
                        <small>Email inviata a pistolesiortofrutta@gmail.com</small>
                    `;
                    document.getElementById('successMessage').classList.add('active');
                    
                    setTimeout(() => {
                        document.getElementById('successMessage').classList.remove('active');
                    }, 7000);

                } catch (error) {
                    console.error('❌ Errore invio ordine:', error);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    
                    let errorMessage = 'Si è verificato un errore durante l\'invio.';
                    
                    if (error.message.includes('Failed to fetch')) {
                        errorMessage = 'Errore di connessione. Controlla internet e riprova.';
                    } else if (error.message.includes('Seleziona')) {
                        errorMessage = error.message;
                    } else if (error.message) {
                        errorMessage = error.message;
                    }
                    
                    alert('⚠️ ' + errorMessage);
                }
            }

            window.resetOrder = function() {
                if (confirm('Sei sicuro di voler azzerare l\'ordine e ricominciare da capo?')) {
                    document.getElementById('customerName').value = '';
                    document.getElementById('customerPhone').value = '';
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    document.getElementById('deliveryDate').value = tomorrow.toISOString().split('T')[0];
                    document.getElementById('orderNotes').value = '';
                    
                    document.querySelectorAll('input[type="number"]').forEach(input => {
                        input.value = '';
                    });
                    document.querySelectorAll('.unit-option').forEach(option => {
                        option.classList.remove('active');
                    });
                    
                    document.getElementById('orderSummary').classList.remove('active');
                    document.getElementById('successMessage').classList.remove('active');
                    
                    document.querySelectorAll('.category-card').forEach(card => {
                        card.classList.remove('active');
                    });
                    document.querySelectorAll('.products').forEach(products => {
                        products.classList.remove('active');
                    });
                    
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }

            window.editOrder = function() {
                // Nascondi solo il riepilogo, mantieni tutti i dati inseriti
                document.getElementById('orderSummary').classList.remove('active');
                
                // Scroll alla sezione prodotti
                document.querySelector('.categories').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // ============================================
            // INIZIALIZZAZIONE
            // ============================================
            console.log('🚀 Inizializzazione applicazione ordini...');
            console.log('📚 Libreria Supabase caricata:', typeof window.supabase !== 'undefined' ? 'Sì' : 'No');
            
            window.addEventListener('DOMContentLoaded', () => {
                console.log('📄 DOM caricato, avvio loadData()...');
                loadData();
            });
            
            console.log('✅ Script caricato correttamente');
        })();
    </script>
